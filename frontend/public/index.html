<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceAttend — Sign In</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0e1420;--surface2:#141c2e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#00d4ff;--accent2:#7c3aed;--green:#00e5a0;--red:#ff4d6d;--amber:#ffb347;
  --text:#e8f0fe;--muted:#4a5568;--muted2:#6b7a99;
  --mono:'Space Mono',monospace;--sans:'Outfit',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,212,255,0.06) 0%, transparent 70%);pointer-events:none}
.login-wrap{width:100%;max-width:420px;padding:20px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:40px}
.logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 0 40px rgba(0,212,255,0.3)}
.logo-name{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-1px}
.logo-name span{color:var(--accent)}
.logo-sub{font-size:13px;color:var(--muted2);margin-top:4px;font-family:var(--mono)}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
.card-title{font-size:20px;font-weight:700;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--muted2);margin-bottom:28px;font-family:var(--mono)}
.form-group{margin-bottom:18px}
label{display:block;font-size:10px;font-weight:700;color:var(--muted2);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
input{width:100%;padding:12px 16px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:var(--sans);transition:border-color 0.2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn-login{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#080c14;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all 0.2s;margin-top:8px}
.btn-login:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.error-msg{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.25);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
.demo-creds{margin-top:24px;padding:16px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.demo-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:10px}
.demo-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:0.15s}
.demo-row:last-child{border-bottom:none}
.demo-row:hover{opacity:0.8}
.demo-role{font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:5px}
.r-admin{background:rgba(124,58,237,0.2);color:#a78bfa}
.r-teacher{background:rgba(0,229,160,0.15);color:var(--green)}
.r-student{background:rgba(0,212,255,0.15);color:var(--accent)}
.demo-email{font-size:12px;color:var(--muted2);font-family:var(--mono)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">👁</div>
    <div class="logo-name">Face<span>Attend</span></div>
    <div class="logo-sub">Intelligent Attendance System</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your account</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@faceattend.tz" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="demo-creds">
      <div class="demo-title">Demo Credentials (click to fill)</div>
      <div class="demo-row" onclick="fillCreds('admin@faceattend.tz','Admin@1234')">
        <span class="demo-role r-admin">Admin</span>
        <span class="demo-email">admin@faceattend.tz</span>
      </div>
      <div class="demo-row" onclick="fillCreds('kaunda@faceattend.tz','Teacher@1234')">
        <span class="demo-role r-teacher">Teacher</span>
        <span class="demo-email">kaunda@faceattend.tz</span>
      </div>
    </div>
  </div>
</div>
<script>
const API = '';
function fillCreds(e, p) {
  document.getElementById('email').value = e;
  document.getElementById('password').value = p;
}
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  err.style.display = 'none';
  if (!email || !password) { showErr('Please fill in all fields'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!data.success) { showErr(data.message); return; }
    localStorage.setItem('fa_token', data.token);
    localStorage.setItem('fa_user', JSON.stringify(data.user));
    window.location.href = '/app.html';
  } catch(e) {
    showErr('Cannot connect to server. Is it running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}
function showErr(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg; err.style.display = 'block';
}
// Redirect if already logged in
if (localStorage.getItem('fa_token')) window.location.href = '/app.html';
</script>
</body>
</html>
